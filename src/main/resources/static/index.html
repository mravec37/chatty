<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatty</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <div class="app-header">
        <h1>Chatty</h1>
    </div>

    <div id="joinArea" class="card">
        <p>Enter your name to join the chat</p>
        <input type="text" id="username" class="join-input" placeholder="Your name" />
        <button onclick="joinChat()">Join</button>
    </div>

    <div id="status"></div>

    <div id="chatArea" class="hidden">
        <div class="welcome-row">
            <h2>Welcome, <span id="displayName"></span>!</h2>
        </div>

        <div id="chatLayout">
            <div id="usersPanel">
                <div class="panel-box">
                    <h3>Connected users</h3>
                    <div class="scroll-panel">
                        <ul id="usersList" class="user-list"></ul>
                    </div>
                </div>

                <div class="panel-box">
                    <h3>Archived conversations</h3>
                    <div class="scroll-panel">
                        <ul id="archivedUsersList" class="user-list"></ul>
                    </div>
                </div>
            </div>

            <div id="conversationPanel" class="panel-box">
                <h3 id="conversationTitle"></h3>
                <div id="offlineNote" class="offline-note hidden">
                    This user is disconnected. You can view the conversation, but you cannot send new messages.
                </div>
                <div id="messages"></div>

                <input type="text" id="messageInput" placeholder="Type a message" />
                <button id="sendButton" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
<script src="app.js"></script>
</body>
</html>
